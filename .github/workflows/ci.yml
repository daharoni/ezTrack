name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[test]"

      - name: Lint (ruff)
        run: |
          ruff check eztrack/ tests/
          ruff format --check eztrack/ tests/

      - name: Test
        # default addopts deselect '-m "not slow"'; -m "" also runs the full-clip run
        run: pytest -m ""
