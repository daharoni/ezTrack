name: lint

# Run for pull requests and pushes to master.
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff linting
        run: ruff check
      - name: Ruff formatting
        run: ruff format --check

  pre-commit:
    # Runs the hooks in .pre-commit-config.yaml (nbstripout), which verifies the
    # bundled notebooks carry no execution outputs. Configuring it only in
    # pre-commit means `pre-commit run --all-files` locally matches CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
